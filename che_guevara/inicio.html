<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="..//style.css">
    <title>House</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="googleapis.com">
    <link rel="preconnect" href="gstatic.com" crossorigin>
    <link href="googleapis.com" rel="stylesheet">
</head>
<body>
<div id="escritorio">
    <div class="ventana" id="win-menu" style="left: 20px; top: 20px; width: 580px; height: 385px;">
      <div class="ventana-barra" data-id="win-menu">
        <span class="ventana-titulo">MENÚ</span>
        <div class="ventana-controles">
          <button class="btn-ventana btn-min" data-id="win-menu" title="Minimizar">_</button>
          <button class="btn-ventana btn-max" data-id="win-menu" title="Maximizar">□</button>
          <button class="btn-ventana btn-close" data-id="win-menu" title="Cerrar">✕</button>
        </div>
      </div>
      <div class="ventana-cuerpo">
        <div class="imagen_glich">
          <Canvas id="c" width="200" height="260" style="display:block;border-radius:8px;background:#000;"></glitchCanvas>
        </div>
        <div class="menu-seleccion">
          <h4>
            <button class="menu_boton" onclick="abrirArticulo()">Golpe de Estado en Guatemala orquestado por EUA en 1954</button>
          </h4>
        </div>
        <div class="resize-handle" data-id="win-menu"></div>
      </div>
    </div>
    <div class="ventana" id="win-info" style="left: 610px; top: 20px; width: 730px; height: 410px;">
      <div class="ventana-barra" data-id="win-info">
        <span class="ventana-titulo">ACERCA DE</span>
        <div class="ventana-controles">
          <button class="btn-ventana btn-min" data-id="win-info" title="Minimizar">_</button>
          <button class="btn-ventana btn-max" data-id="win-info" title="Maximizar">□</button>
          <button class="btn-ventana btn-close" data-id="win-info" title="Cerrar">✕</button>
        </div>
      </div>
      <div class="ventana-cuerpo">
        <p class="info-texto">
          En esta pagina subo pequeños articulos relacionados con los reels que subo en instagram :)
        </p>
        <div class="resize-handle" data-id="win-info"></div>
      </div>
    </div>
</div>
  <!-- TASKBAR inferior -->
  <div id="taskbar">
    <span class="taskbar-logo">SYS://</span>
    <div id="taskbar-botones"></div>
    <button id="btn-nueva-nota" onclick="crearNota()">+ NUEVA NOTA</button>
  </div>
<audio id="audio-bg" src="..//audio/fondo.mp3" loop></audio>
<script src="..//ventanas.js"></script>
<script>
const glitchCanvas = document.getElementById('c');
const glitchCtx = glitchCanvas.getContext('2d');
const GW = glitchCanvas.width, GH = glitchCanvas.height;

const IMAGE_SRC = '../imagenes/che_guevara.png';

const palette = { bg:[0,0,0], lo:[0,20,60], hi:[0,120,255], face:[100,200,255] };

let userImg = null;
let frame = 0;
let brightness = 0;
let bDir = 1;
let noiseCache = null;
let glitchActive = false;
let glitchTimer = 0;

const glitchImg = new Image();
glitchImg.crossOrigin = 'anonymous';
glitchImg.onload = () => { userImg = glitchImg; };
glitchImg.src = IMAGE_SRC;

function lerpColor(a,b,t){
  return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t];
}

function buildNoise(){
  const d = glitchCtx.createImageData(GW,GH);
  for(let y=0;y<GH;y++){
    for(let x=0;x<GW;x++){
      const i=(y*GW+x)*4;
      let col;
      if(Math.random()<0.06){
        col=lerpColor(palette.lo,palette.hi,Math.random());
      } else {
        col=[0,0,0];
      }
      d.data[i]=col[0]; d.data[i+1]=col[1]; d.data[i+2]=col[2]; d.data[i+3]=255;
    }
  }
  noiseCache=d;
}

function drawScanlines(){
  glitchCtx.save();
  for(let y=0;y<GH;y+=3){
    glitchCtx.fillStyle='rgba(0,0,0,0.18)';
    glitchCtx.fillRect(0,y,GW,1);
  }
  glitchCtx.restore();
}

function drawGlitch(){
  const slices=4+Math.floor(Math.random()*5);
  for(let i=0;i<slices;i++){
    const sy=Math.floor(Math.random()*GH);
    const sh=Math.floor(2+Math.random()*8);
    const dx=Math.floor(-20+Math.random()*40);
    const id=glitchCtx.getImageData(0,sy,GW,sh);
    glitchCtx.putImageData(id,dx,sy);
  }
  glitchCtx.save();
  glitchCtx.globalAlpha=0.08;
  glitchCtx.fillStyle=`rgb(${palette.hi[0]},${palette.hi[1]},${palette.hi[2]})`;
  glitchCtx.fillRect(0,Math.floor(Math.random()*GH),GW,Math.floor(2+Math.random()*6));
  glitchCtx.restore();
}

function drawVignette(){
  const g=glitchCtx.createRadialGradient(GW/2,GH/2,0,GW/2,GH/2,Math.max(GW,GH)*0.6);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(0.45,'rgba(0,0,0,0.2)');
  g.addColorStop(1,'rgba(0,0,0,0.95)');
  glitchCtx.fillStyle=g;
  glitchCtx.fillRect(0,0,GW,GH);
}

function drawFaceGlow(brt){
  const gr=glitchCtx.createRadialGradient(GW/2,GH/2,0,GW/2,GH/2,GH*0.45);
  const [r,g,b]=palette.hi;
  gr.addColorStop(0,`rgba(${r},${g},${b},${0.15*brt})`);
  gr.addColorStop(1,'rgba(0,0,0,0)');
  glitchCtx.fillStyle=gr;
  glitchCtx.fillRect(0,0,GW,GH);
}

function drawFace(brt){
  const fw=GW*0.95*0.9, fh=GH*0.65*1.1;
  const fx=(GW-fw)/2, fy=(GH-fh)/2-fh*0.05;

  if(userImg){
    glitchCtx.save();
    const tmpC=document.createElement('canvas');
    tmpC.width=Math.round(fw); tmpC.height=Math.round(fh);
    const tmpCtx=tmpC.getContext('2d');
    const ratio=Math.min(fw/userImg.width,fh/userImg.height);
    const dw=userImg.width*ratio, dh=userImg.height*ratio;
    tmpCtx.drawImage(userImg,(fw-dw)/2,(fh-dh)/2,dw,dh);
    const id=tmpCtx.getImageData(0,0,Math.round(fw),Math.round(fh));
    const dat=id.data;
    for(let i=0;i<dat.length;i+=4){
      const gray=(dat[i]*0.3+dat[i+1]*0.59+dat[i+2]*0.11)/255;
      let col;
      if(gray<0.15) col=palette.bg;
      else if(gray<0.45) col=lerpColor(palette.lo,palette.hi,(gray-0.15)/0.3);
      else if(gray<0.75) col=lerpColor(palette.hi,palette.face,(gray-0.45)/0.3);
      else col=palette.face;
      dat[i]=col[0]; dat[i+1]=col[1]; dat[i+2]=col[2];
      dat[i+3]=Math.round(255*(0.5+gray*0.5)*brt);
    }
    tmpCtx.putImageData(id,0,0);
    glitchCtx.drawImage(tmpC,fx,fy);
    glitchCtx.restore();
  }
}

function loop(){
  frame++;
  if(frame%10===0){
    brightness+=bDir*(0.05+Math.random()*0.1);
    if(brightness>=1){ brightness=1; bDir=-1; }
    if(brightness<=0){ brightness=0; bDir=1; }
    if(Math.random()<0.03) brightness=Math.random()<0.5?0:1;
    noiseCache=null;
  }

  if(Math.random()<0.008){ glitchActive=true; glitchTimer=3+Math.floor(Math.random()*6); }
  if(glitchTimer>0) glitchTimer--;
  else glitchActive=false;

  if(!noiseCache) buildNoise();
  glitchCtx.putImageData(noiseCache,0,0);
  drawFaceGlow(brightness);
  drawFace(brightness);
  if(glitchActive) drawGlitch();
  drawScanlines();
  drawVignette();

  requestAnimationFrame(loop);
}
function abrirArticulo() {
  const id = 'win-guatemala';

  // Si ya está abierta, solo traerla al frente
  if (registroVentanas[id]) {
    traerAlFrente(id);
    return;
  }

  const el = document.createElement('div');
  el.className = 'ventana';
  el.id = id;
  el.style.cssText = 'left:100px; top:60px; width:680px; height:480px;';

  el.innerHTML = `
    <div class="ventana-barra" data-id="${id}">
      <span class="ventana-titulo">GUATEMALA 1954</span>
      <div class="ventana-controles">
        <button class="btn-ventana btn-min" title="Minimizar">_</button>
        <button class="btn-ventana btn-max" title="Maximizar">□</button>
        <button class="btn-ventana btn-close" title="Cerrar">✕</button>
      </div>
    </div>
    <div class="ventana-cuerpo">
      <div class="info-texto">
        <h3 style="color: rgba(65,205,220,1); margin-bottom: 16px;">
          Golpe de Estado en Guatemala orquestado por EUA en 1954
        </h3>
        <p>Aquí va artículo...</p>
      </div>
      <div class="resize-handle" data-id="${id}"></div>
    </div>
  `;

  document.getElementById('escritorio').appendChild(el);

  registroVentanas[id] = {
    el,
    minimizada: false,
    maximizada: false,
    rectAnterior: null
  };

  inicializarVentana(id);
  agregarBotonTaskbar(id);
  traerAlFrente(id);
}
loop();
if (sessionStorage.getItem('boot-completo')) {
  const audio = document.getElementById('audio-bg');
  audio.volume = 1.0;

  // Intentamos directo (funciona en Firefox y algunos casos)
  audio.play().catch(() => {
    // Si falla, esperamos cualquier interacción del usuario
    const arrancar = () => {
      audio.play();
      document.removeEventListener('click', arrancar);
      document.removeEventListener('keydown', arrancar);
    };
    document.addEventListener('click', arrancar);
    document.addEventListener('keydown', arrancar);
  });
}
</script>
</body>
</html>
